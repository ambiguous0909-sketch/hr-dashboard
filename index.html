<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR 재직인원 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; padding: 24px; }
    .container { max-width: 960px; margin: 0 auto; }
    .card { background: #fff; border-radius: 14px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .header h1 { font-size: 22px; font-weight: 700; color: #1e293b; }
    .header p { font-size: 13px; color: #94a3b8; margin-top: 2px; }
    .selects { display: flex; gap: 8px; }
    select { border: 1px solid #e2e8f0; border-radius: 8px; padding: 6px 12px; font-size: 14px; color: #334155; background: #f8fafc; cursor: pointer; }
    .summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
    .summary-card { background: #fff; border-radius: 14px; padding: 18px 22px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
    .summary-card .label { font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .summary-card .value { font-size: 28px; font-weight: 700; }
    .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .chart-title { font-weight: 600; color: #1e293b; margin-bottom: 16px; font-size: 15px; }
    .dept-row { display: flex; align-items: center; gap: 12px; padding: 10px 14px; background: #f8fafc; border-radius: 10px; margin-bottom: 10px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
    .dept-name { flex: 1; font-weight: 500; color: #334155; font-size: 14px; cursor: pointer; }
    .dept-name input { border: 1px solid #6366f1; border-radius: 6px; padding: 4px 8px; font-size: 14px; width: 100px; }
    .counter { display: flex; align-items: center; gap: 6px; }
    .btn-count { width: 28px; height: 28px; border-radius: 6px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-size: 16px; color: #64748b; display: flex; align-items: center; justify-content: center; }
    .count-input { width: 64px; text-align: center; border: 1px solid #e2e8f0; border-radius: 6px; padding: 4px 0; font-size: 15px; font-weight: 600; color: #1e293b; }
    .unit { font-size: 13px; color: #94a3b8; width: 20px; }
    .btn-del { background: none; border: none; color: #f43f5e; cursor: pointer; font-size: 18px; margin-left: 4px; }
    .add-row { display: flex; gap: 8px; margin-top: 14px; }
    .add-input { flex: 1; border: 1px solid #e2e8f0; border-radius: 8px; padding: 8px 14px; font-size: 14px; color: #334155; }
    .btn-add { background: #6366f1; color: #fff; border: none; border-radius: 8px; padding: 8px 18px; font-size: 14px; font-weight: 600; cursor: pointer; }
    @media (max-width: 600px) { .summary { grid-template-columns: 1fr; } .charts { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="card header">
    <div>
      <h1>📋 HR 재직인원 대시보드</h1>
      <p>월초 기준 부서별 재직인원 현황</p>
    </div>
    <div class="selects">
      <select id="yearSel"></select>
      <select id="monthSel"></select>
    </div>
  </div>

  <!-- Summary -->
  <div class="summary">
    <div class="summary-card">
      <div class="label">👥 전체 재직인원</div>
      <div class="value" id="totalVal" style="color:#6366f1">-</div>
    </div>
    <div class="summary-card">
      <div class="label">🏢 부서 수</div>
      <div class="value" id="deptVal" style="color:#10b981">-</div>
    </div>
    <div class="summary-card">
      <div class="label">📊 평균 부서 인원</div>
      <div class="value" id="avgVal" style="color:#f59e0b">-</div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts">
    <div class="card">
      <div class="chart-title">부서별 인원 비교</div>
      <canvas id="barChart" height="200"></canvas>
    </div>
    <div class="card">
      <div class="chart-title">부서별 비율</div>
      <canvas id="pieChart" height="200"></canvas>
    </div>
  </div>

  <!-- Dept Table -->
  <div class="card">
    <div class="chart-title">부서별 인원 입력</div>
    <div id="deptList"></div>
    <div class="add-row">
      <input class="add-input" id="newDeptInput" placeholder="새 부서명 입력" />
      <button class="btn-add" onclick="addDept()">+ 부서 추가</button>
    </div>
  </div>
</div>

<script>
const COLORS = ["#6366f1","#22d3ee","#f59e0b","#10b981","#f43f5e","#8b5cf6","#3b82f6","#ec4899","#14b8a6","#f97316"];
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

let depts = [
  { id:1, name:"개발", count:32 },
  { id:2, name:"마케팅", count:18 },
  { id:3, name:"영업", count:25 },
  { id:4, name:"인사", count:10 },
  { id:5, name:"재무", count:8 },
];
let nextId = 6;
let barChart, pieChart;

// Year/Month selectors
const today = new Date();
const yearSel = document.getElementById("yearSel");
const monthSel = document.getElementById("monthSel");
for (let y = today.getFullYear() - 2; y <= today.getFullYear() + 2; y++) {
  yearSel.innerHTML += `<option value="${y}" ${y === today.getFullYear() ? "selected" : ""}>${y}년</option>`;
}
MONTHS.forEach((m, i) => {
  monthSel.innerHTML += `<option value="${i+1}" ${i+1 === today.getMonth()+1 ? "selected" : ""}>${m}</option>`;
});

function getTotal() { return depts.reduce((s, d) => s + d.count, 0); }

function updateSummary() {
  const total = getTotal();
  document.getElementById("totalVal").textContent = total.toLocaleString() + "명";
  document.getElementById("deptVal").textContent = depts.length + "개";
  document.getElementById("avgVal").textContent = depts.length ? Math.round(total / depts.length) + "명" : "-";
}

function updateCharts() {
  const labels = depts.map(d => d.name);
  const data = depts.map(d => d.count);
  const colors = depts.map((_, i) => COLORS[i % COLORS.length]);

  if (barChart) barChart.destroy();
  barChart = new Chart(document.getElementById("barChart"), {
    type: "bar",
    data: { labels, datasets: [{ data, backgroundColor: colors, borderRadius: 6 }] },
    options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } }, responsive: true }
  });

  if (pieChart) pieChart.destroy();
  pieChart = new Chart(document.getElementById("pieChart"), {
    type: "doughnut",
    data: { labels, datasets: [{ data, backgroundColor: colors }] },
    options: { plugins: { legend: { position: "bottom", labels: { font: { size: 11 } } } }, responsive: true }
  });
}

function renderDepts() {
  const list = document.getElementById("deptList");
  list.innerHTML = depts.map((d, i) => `
    <div class="dept-row" id="row-${d.id}">
      <div class="dot" style="background:${COLORS[i % COLORS.length]}"></div>
      <span class="dept-name" onclick="editName(${d.id})" id="name-${d.id}">${d.name}</span>
      <div class="counter">
        <button class="btn-count" onclick="changeCount(${d.id}, -1)">−</button>
        <input class="count-input" type="number" value="${d.count}" min="0" onchange="setCount(${d.id}, this.value)" />
        <button class="btn-count" onclick="changeCount(${d.id}, 1)">+</button>
      </div>
      <span class="unit">명</span>
      <button class="btn-del" onclick="removeDept(${d.id})">✕</button>
    </div>
  `).join("");
  updateSummary();
  updateCharts();
}

function editName(id) {
  const span = document.getElementById("name-" + id);
  const d = depts.find(x => x.id === id);
  span.innerHTML = `<input value="${d.name}" onblur="saveName(${id}, this.value)" onkeydown="if(event.key==='Enter')this.blur()" autofocus style="border:1px solid #6366f1;border-radius:6px;padding:4px 8px;font-size:14px;width:100px;" />`;
  span.querySelector("input").focus();
}

function saveName(id, val) {
  depts = depts.map(d => d.id === id ? { ...d, name: val.trim() || d.name } : d);
  renderDepts();
}

function changeCount(id, delta) {
  depts = depts.map(d => d.id === id ? { ...d, count: Math.max(0, d.count + delta) } : d);
  renderDepts();
}

function setCount(id, val) {
  depts = depts.map(d => d.id === id ? { ...d, count: Math.max(0, parseInt(val) || 0) } : d);
  updateSummary(); updateCharts();
}

function removeDept(id) {
  depts = depts.filter(d => d.id !== id);
  renderDepts();
}

function addDept() {
  const input = document.getElementById("newDeptInput");
  if (!input.value.trim()) return;
  depts.push({ id: nextId++, name: input.value.trim(), count: 0 });
  input.value = "";
  renderDepts();
}

document.getElementById("newDeptInput").addEventListener("keydown", e => { if (e.key === "Enter") addDept(); });

renderDepts();
</script>
</body>
</html>
