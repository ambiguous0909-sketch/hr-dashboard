<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR 재직인원 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.5.0/Recharts.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.21.4/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; padding: 24px; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;
const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

const COLORS = ["#6366f1","#22d3ee","#f59e0b","#10b981","#f43f5e","#8b5cf6","#3b82f6","#ec4899","#14b8a6","#f97316"];
const MONTHS = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

const initDepts = [
  { id: 1, name: "개발", count: 32 },
  { id: 2, name: "마케팅", count: 18 },
  { id: 3, name: "영업", count: 25 },
  { id: 4, name: "인사", count: 10 },
  { id: 5, name: "재무", count: 8 },
];

function App() {
  const today = new Date();
  const [year, setYear] = useState(today.getFullYear());
  const [month, setMonth] = useState(today.getMonth() + 1);
  const [depts, setDepts] = useState(initDepts);
  const [newDeptName, setNewDeptName] = useState("");
  const [editing, setEditing] = useState(null);
  const [nextId, setNextId] = useState(6);

  const total = depts.reduce((s, d) => s + d.count, 0);
  const years = Array.from({ length: 5 }, (_, i) => today.getFullYear() - 2 + i);

  const addDept = () => {
    if (!newDeptName.trim()) return;
    setDepts(d => [...d, { id: nextId, name: newDeptName.trim(), count: 0 }]);
    setNextId(n => n + 1);
    setNewDeptName("");
  };

  const removeDept = (id) => setDepts(d => d.filter(x => x.id !== id));
  const updateCount = (id, val) => {
    const n = Math.max(0, parseInt(val) || 0);
    setDepts(d => d.map(x => x.id === id ? { ...x, count: n } : x));
  };
  const updateName = (id, val) => setDepts(d => d.map(x => x.id === id ? { ...x, name: val } : x));

  const card = (icon, label, value, color) => (
    <div style={{ background:"#fff", borderRadius:14, padding:"18px 22px", boxShadow:"0 1px 4px #0001", flex:1 }}>
      <div style={{ fontSize:13, color:"#94a3b8", marginBottom:6 }}>{icon} {label}</div>
      <div style={{ fontSize:28, fontWeight:700, color }}>{value}</div>
    </div>
  );

  return (
    <div style={{ maxWidth: 960, margin: "0 auto" }}>
      {/* Header */}
      <div style={{ background:"#fff", borderRadius:16, padding:"20px 28px", marginBottom:20, display:"flex", alignItems:"center", justifyContent:"space-between", boxShadow:"0 1px 4px #0001" }}>
        <div>
          <div style={{ fontSize:22, fontWeight:700, color:"#1e293b" }}>📋 HR 재직인원 대시보드</div>
          <div style={{ fontSize:13, color:"#94a3b8", marginTop:2 }}>월초 기준 부서별 재직인원 현황</div>
        </div>
        <div style={{ display:"flex", gap:8 }}>
          <select value={year} onChange={e => setYear(Number(e.target.value))}
            style={{ border:"1px solid #e2e8f0", borderRadius:8, padding:"6px 12px", fontSize:14, color:"#334155", background:"#f8fafc" }}>
            {years.map(y => <option key={y} value={y}>{y}년</option>)}
          </select>
          <select value={month} onChange={e => setMonth(Number(e.target.value))}
            style={{ border:"1px solid #e2e8f0", borderRadius:8, padding:"6px 12px", fontSize:14, color:"#334155", background:"#f8fafc" }}>
            {MONTHS.map((m, i) => <option key={i} value={i+1}>{m}</option>)}
          </select>
        </div>
      </div>

      {/* Cards */}
      <div style={{ display:"flex", gap:16, marginBottom:20 }}>
        {card("👥", "전체 재직인원", `${total.toLocaleString()}명`, "#6366f1")}
        {card("🏢", "부서 수", `${depts.length}개`, "#10b981")}
        {card("📊", "평균 부서 인원", depts.length ? `${Math.round(total/depts.length)}명` : "-", "#f59e0b")}
      </div>

      {/* Charts */}
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:20 }}>
        <div style={{ background:"#fff", borderRadius:14, padding:"20px 24px", boxShadow:"0 1px 4px #0001" }}>
          <div style={{ fontWeight:600, color:"#1e293b", marginBottom:16, fontSize:15 }}>부서별 인원 비교</div>
          <ResponsiveContainer width="100%" height={220}>
            <BarChart data={depts} margin={{ left:-20 }}>
              <XAxis dataKey="name" tick={{ fontSize:12 }} />
              <YAxis tick={{ fontSize:12 }} />
              <Tooltip formatter={v => [`${v}명`]} />
              <Bar dataKey="count" radius={[6,6,0,0]}>
                {depts.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
              </Bar>
            </BarChart>
          </ResponsiveContainer>
        </div>
        <div style={{ background:"#fff", borderRadius:14, padding:"20px 24px", boxShadow:"0 1px 4px #0001" }}>
          <div style={{ fontWeight:600, color:"#1e293b", marginBottom:16, fontSize:15 }}>부서별 비율</div>
          <ResponsiveContainer width="100%" height={220}>
            <PieChart>
              <Pie data={depts} dataKey="count" nameKey="name" cx="50%" cy="50%" outerRadius={80}
                label={({ name, percent }) => `${name} ${(percent*100).toFixed(0)}%`} labelLine={false}>
                {depts.map((_, i) => <Cell key={i} fill={COLORS[i % COLORS.length]} />)}
              </Pie>
              <Tooltip formatter={v => [`${v}명`]} />
            </PieChart>
          </ResponsiveContainer>
        </div>
      </div>

      {/* Table */}
      <div style={{ background:"#fff", borderRadius:14, padding:"20px 24px", boxShadow:"0 1px 4px #0001" }}>
        <div style={{ fontWeight:600, color:"#1e293b", marginBottom:16, fontSize:15 }}>부서별 인원 입력</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {depts.map((d, i) => (
            <div key={d.id} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 14px", background:"#f8fafc", borderRadius:10 }}>
              <div style={{ width:12, height:12, borderRadius:"50%", background:COLORS[i % COLORS.length], flexShrink:0 }} />
              {editing === d.id ? (
                <input value={d.name} onChange={e => updateName(d.id, e.target.value)}
                  onBlur={() => setEditing(null)} autoFocus
                  style={{ border:"1px solid #6366f1", borderRadius:6, padding:"4px 8px", fontSize:14, width:100 }} />
              ) : (
                <span onClick={() => setEditing(d.id)}
                  style={{ flex:1, fontWeight:500, color:"#334155", cursor:"pointer", fontSize:14 }} title="클릭하여 수정">{d.name}</span>
              )}
              <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                <button onClick={() => updateCount(d.id, d.count - 1)}
                  style={{ width:28, height:28, borderRadius:6, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:16, color:"#64748b" }}>−</button>
                <input type="number" value={d.count} min={0} onChange={e => updateCount(d.id, e.target.value)}
                  style={{ width:64, textAlign:"center", border:"1px solid #e2e8f0", borderRadius:6, padding:"4px 0", fontSize:15, fontWeight:600, color:"#1e293b" }} />
                <button onClick={() => updateCount(d.id, d.count + 1)}
                  style={{ width:28, height:28, borderRadius:6, border:"1px solid #e2e8f0", background:"#fff", cursor:"pointer", fontSize:16, color:"#64748b" }}>+</button>
              </div>
              <span style={{ fontSize:13, color:"#94a3b8", width:32, textAlign:"right" }}>명</span>
              <button onClick={() => removeDept(d.id)}
                style={{ marginLeft:4, background:"none", border:"none", color:"#f43f5e", cursor:"pointer", fontSize:18 }}>✕</button>
            </div>
          ))}
        </div>
        <div style={{ display:"flex", gap:8, marginTop:14 }}>
          <input value={newDeptName} onChange={e => setNewDeptName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && addDept()}
            placeholder="새 부서명 입력"
            style={{ flex:1, border:"1px solid #e2e8f0", borderRadius:8, padding:"8px 14px", fontSize:14, color:"#334155" }} />
          <button onClick={addDept}
            style={{ background:"#6366f1", color:"#fff", border:"none", borderRadius:8, padding:"8px 18px", fontSize:14, fontWeight:600, cursor:"pointer" }}>
            + 부서 추가
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
